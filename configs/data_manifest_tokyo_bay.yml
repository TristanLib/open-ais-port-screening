pipeline_parameters:
  trajectory_segmentation:
    max_time_gap_s: 1800
    max_distance_gap_nm: 5.0
    max_implied_speed_kn: 60.0
  track_filter:
    min_points: 20
  grid:
    cell_size_deg: 0.005
  traffic_patterns:
    moving_sog_min_kn: 1.0
    normal_percentile: 75
    high_confidence_percentile: 90
    min_track_segments_per_cell: 5
  anomaly_detection:
    min_score: 0.35
  encounter_screening:
    time_bin_seconds: 60
    max_state_skew_s: 60
    max_state_age_s: 60
    state_alignment: epoch-aligned causal grid with latest valid state propagated forward
    spatial_index: dynamic bucket radius plus post-index 2 nm threshold in the local nautical-mile metric
    min_sog_kn: 1.0
    max_current_distance_nm: 2.0
    dcpa_threshold_nm: 0.5
    tcpa_threshold_min: 15.0
    complete_opportunity_records: true
  strict_future_check:
    lookahead_min: 15
    evaluation_step_s: 30
    max_interpolation_gap_s: 180
    min_common_fraction: 0.70
    required_common_samples_30s_grid: 21
    required_common_coverage_s: 630
    max_uncovered_gap_s: 180
    predicted_time_tolerance_s: 60
    primary_minimum: continuous same-segment piecewise-linear solution
    grid_sensitivity_s: 10, 30, 60
  geometric_controls:
    candidate_episode_gap_min: 15
    control_exclusion_min: 15
    control_thinning_min: 15
    exact_strata: date, 4-hour UTC block, 0.05-degree area, 0.5-nm current-distance band, local-exposure tertile
    reference_time_caliper_min: 60
    relative_speed_caliper_kn: 5
    closing_speed_caliper_kn: 2.5
    matching: deterministic 1-to-1 without replacement on six normalized differences
    bootstrap_unit: connected component of candidate/control vessel-pair-day bipartite graph
    bootstrap_iterations: 2000
    bootstrap_seed: 20260722
  dual_objective_ranking:
    budgets: 0.05, 0.10, 0.20
    lodo_pattern_refit: six training days only
    held_out_isolation: held-out rows excluded from pattern learning and training behavior scoring
    interpretation: internal multi-evidence coverage only
  fused_hotspots:
    encounter_weight: 0.75
    top_percent: 0.10

