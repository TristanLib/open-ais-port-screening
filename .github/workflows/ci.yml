name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-lock.txt
      - name: Compile Python sources
        run: python -m compileall -q src tests scripts
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run synthetic pipeline smoke test
        run: python src/sample_pipeline_smoke.py --clean-output
      - name: Verify public release boundary
        run: python scripts/verify_public_repository.py
